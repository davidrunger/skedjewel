name: Build and Test

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Crystal
        uses: crystal-lang/install-crystal@d8ef131ecec0352ce0e39b81b0a6d95def58fe2f # v1.9.2

      - name: Verify Crystal version
        run: ./bin/ci/verify-crystal-version.sh

      - name: Install shards
        run: shards install

      - name: Build exe/skedjewel.cr
        run: crystal build exe/skedjewel.cr

      - name: Run tests
        run: crystal spec
